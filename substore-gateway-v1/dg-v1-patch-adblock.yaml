proxyGroups:
  - name: 🛑 广告拦截
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ✈️ 手动选择

ruleProviders:
  reject_non_ip:
    type: http
    behavior: classical
    format: text
    interval: 43200
    url: https://ruleset.skk.moe/Clash/non_ip/reject.txt
    path: ./ruleset/reject_non_ip.txt
  reject_non_ip_no_drop:
    type: http
    behavior: classical
    format: text
    interval: 43200
    url: https://ruleset.skk.moe/Clash/non_ip/reject-no-drop.txt
    path: ./ruleset/reject_non_ip_no_drop.txt
  reject_domainset:
    type: http
    behavior: domain
    format: text
    interval: 43200
    url: https://ruleset.skk.moe/Clash/domainset/reject.txt
    path: ./ruleset/reject_domainset.txt
  reject_ip:
    type: http
    behavior: classical
    format: text
    interval: 43200
    url: https://ruleset.skk.moe/Clash/ip/reject.txt
    path: ./ruleset/reject_ip.txt
  sogouinput:
    type: http
    behavior: classical
    format: text
    interval: 43200
    url: https://ruleset.skk.moe/Clash/non_ip/sogouinput.txt
    path: ./ruleset/sogouinput.txt

insertRulesAfter:
  pattern: '^RULE-SET,(Lan|ai_non_ip|apple_intelligence_non_ip),'
  rules:
    - RULE-SET,reject_non_ip,🛑 广告拦截
    - RULE-SET,reject_domainset,🛑 广告拦截
    - RULE-SET,reject_non_ip_no_drop,🛑 广告拦截
    - RULE-SET,reject_ip,🛑 广告拦截
    - RULE-SET,sogouinput,🛑 广告拦截
