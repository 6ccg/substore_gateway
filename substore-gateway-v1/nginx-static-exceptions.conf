# Add these locations inside your existing server block, before the reverse proxy.
# Replace /path/to/substore-gateway-manager with this repository's deployment path.

location = /substore-gateway-manager-v1.html {
    alias /path/to/substore-gateway-manager/substore-gateway-manager-v1.html;
}

location ^~ /substore-gateway-v1/ {
    alias /path/to/substore-gateway-manager/substore-gateway-v1/;
}
