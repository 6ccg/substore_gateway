rules:
  - RULE-SET,Lan,DIRECT
  - RULE-SET,ai_non_ip,💬 AI专用
  - RULE-SET,apple_intelligence_non_ip,💬 AI专用
  - RULE-SET,Twitter,𝕏 推特服务
  - RULE-SET,telegram_non_ip,📱 Telegram服务
