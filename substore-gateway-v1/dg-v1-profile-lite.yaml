  - RULE-SET,apple_cn_non_ip,🍎 苹果中国
  - RULE-SET,apple_services,🍏 苹果服务
  - RULE-SET,Game,🎮 游戏平台
  - RULE-SET,cdn_domainset,🚀 节点选择
  - RULE-SET,cdn_non_ip,🚀 节点选择
  - RULE-SET,global_non_ip,🚀 节点选择
